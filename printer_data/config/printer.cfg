[virtual_sdcard]
path: /home/radxa/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics:corexy
max_velocity: 800
max_accel: 20000
max_z_velocity: 12
max_z_accel: 100
square_corner_velocity: 5

[exclude_object]

[force_move]
enable_force_move: true



