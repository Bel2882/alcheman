gcode:
       AXIS_TWIST_COMPENSATION_CALIBRATE

########################<<<<<<<<<<起始打印调校>>>>>>>>>>#######################################

[gcode_macro PRINT_START]
gcode:
      SET_VELOCITY_LIMIT ACCEL=10000
      SET_VELOCITY_LIMIT ACCEL_TO_DECEL=5000
       G28
       {% set bedtemp = params.BED|int %} #设置热床温度
     M190 S{bedtemp}       #等待热床温度稳定  
     M109 S200
      #  Z_TILT_ADJUST
       G92 E0         #重置挤出机 
    #  BED_MESH_CALIBRATE  PROFILE="default"  #  adaptive=1 
    #  BED_MESH_PROFILE  LOAD="default"    #加载网床
       M117 Heating... 
    {% set hotendtemp = params.HOTEND|int %} #设置打印头温度  
    M109 S{hotendtemp}    #等待加热头温度稳定
    G1 E-2 F1800
    G1 E2 F1800
    neo_all_close
    neo_progressbar_on


[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    {% set PROBE_Z_OFFSET = printer.configfile.settings['probe_eddy_current fly_eddy_probe'].z_offset|float %}
    # ========== State Save ==========
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    
    # ========== Environment Preparation ==========
    BED_MESH_CLEAR                       # Clear existing bed mesh data 
    
    # ========== Main Leveling Process ==========
    {% if not printer.z_tilt.applied %}
        # Initial coarse adjustment 
        _Z_TILT_ADJUST horizontal_move_z=10 retry_tolerance=1
    {% endif %}
    
    # Fine secondary leveling 
    _Z_TILT_ADJUST horizontal_move_z={PROBE_Z_OFFSET} retry_tolerance=0.075 retries=20 METHOD=rapid_scan ADAPTIVE=1
        G0 Z10 F6000                     # Use standard G-code commands instead of HORIZONTAL_MOVE_Z

    # ========== Post-Processing ==========
    G90                                 # Force absolute coordinate mode 
    G0 Z10 F6000                        # Raise Z axis to safe height 
    M117 Z_tilt Completed               # Display completion status 
    #G28                                 # Return to origin
    # ========== State Restore ==========
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT
    M400    

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    neo_all_close
    neo_breathing_on
    M104 S0 ; turn off temperature
    M140 S0
      G91
      G1 Z+25 F1500
      G90
      G28 X Y  
      M84 
  
    
    BED_MESH_CLEAR
    neo_all_close
    neo_rainbow_on

[gcode_arcs]
resolution: 0.1

[temperature_sensor GJT]
sensor_type: temperature_mcu
sensor_mcu: GJT

